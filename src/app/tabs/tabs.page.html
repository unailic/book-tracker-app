<ion-tabs>
  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="tab1" href="/tabs/tab1">
      <ion-icon name="book-outline"></ion-icon>
      <ion-label>{{ isAdmin ? 'Katalog' : 'Pretraži' }}</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab2" href="/tabs/tab2">
      <ion-icon name="library-outline"></ion-icon>
      <ion-label>{{ isAdmin ? 'Korisnici' : 'Moje knjige' }}</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="tab3" href="/tabs/tab3">
      <ion-icon [name]="isAdmin ? 'bar-chart-outline' : 'person-circle-outline'"></ion-icon>
      <ion-label>{{ isAdmin ? 'Statistike' : 'Moj profil' }}</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
