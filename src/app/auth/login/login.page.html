<ion-content>
  <div class="page-wrapper">
    <div class="logo-section">
      <div class="icon-wrapper">
        <ion-icon name="book"></ion-icon>
      </div>
      <h1 class="app-title">BookSelf</h1>
      <p class="app-subtitle">Tvoja lična polica knjiga</p>
    </div>

    <div class="form-card">
      <div class="input-wrapper">
        <label class="input-label">Email</label>
        <input class="input-field" type="email" [(ngModel)]="email" placeholder="unesite email" />
      </div>

      <div class="input-wrapper">
        <label class="input-label">Lozinka</label>
        <div class="password-wrapper">
          <input class="input-field" [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" placeholder="unesite lozinku" />
          <ion-icon class="eye-icon" [name]="showPassword ? 'eye-off-outline' : 'eye-outline'" (click)="showPassword = !showPassword"></ion-icon>
        </div>
      </div>

      <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>

      <button class="main-button" (click)="login()">Prijavi se</button>
      <button class="secondary-button" (click)="goToRegister()">Nemate nalog? Registrujte se</button>
    </div>
  </div>
</ion-content>
